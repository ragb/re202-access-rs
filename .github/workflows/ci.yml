name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Opt into Node 24 for JS actions ahead of the June 2026 forced switch.
  # Silences the deprecation warnings on actions/checkout@v4, upload-artifact@v4,
  # and jetli/wasm-pack-action@v0.4.0.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  native:
    name: Native (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux MIDI deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Verify schemas/ are up to date
        # Regenerates the committed JSON Schemas and fails if they drift.
        # If this step fails locally, run:
        #   cargo run --release --bin re202 -- schema system > schemas/re202-system.schema.json
        #   cargo run --release --bin re202 -- schema memory > schemas/re202-memory.schema.json
        # and commit the result.
        run: |
          cargo run --release --bin re202 --locked -- schema system > /tmp/system.schema.json
          cargo run --release --bin re202 --locked -- schema memory > /tmp/memory.schema.json
          diff -u schemas/re202-system.schema.json /tmp/system.schema.json
          diff -u schemas/re202-memory.schema.json /tmp/memory.schema.json

  wasm:
    name: WASM bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: wasm-pack test (Node)
        working-directory: re202-wasm
        run: wasm-pack test --node

      - name: wasm-pack build (web)
        working-directory: re202-wasm
        run: wasm-pack build --target web --release

      - name: Upload pkg/ artifact
        uses: actions/upload-artifact@v4
        with:
          name: re202-wasm-pkg
          path: re202-wasm/pkg/
          if-no-files-found: error
